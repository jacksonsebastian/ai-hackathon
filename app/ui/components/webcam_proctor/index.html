<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Webcam Proctor</title>

  <script src="https://unpkg.com/streamlit-component-lib@1.4.0/dist/index.js"></script>

  <style>
    body {
      margin: 0;
      padding: 10px;
      font-family: Arial, sans-serif;
      background: transparent;
    }

    .container {
      border: 1px solid #dddddd;
      border-radius: 10px;
      padding: 12px;
      background: #ffffff;
      box-sizing: border-box;
    }

    video {
      width: 100%;
      max-width: 520px;
      border-radius: 8px;
      background: #000000;
      display: block;
    }

    canvas {
      display: none;
    }

    .status {
      margin-top: 8px;
      font-size: 14px;
      color: #444444;
      line-height: 1.4;
    }

    .ok {
      color: #0a7a0a;
      font-weight: bold;
    }

    .error {
      color: #b00020;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="status" class="status">Initializing webcam...</div>
  </div>

  <script>
    const Streamlit = window.Streamlit;

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const statusEl = document.getElementById("status");

    let captureIntervalSeconds = 30;
    let captureTimer = null;
    let streamStarted = false;

    function setStatus(message, cssClass) {
      statusEl.className = "status " + (cssClass || "");
      statusEl.innerText = message;
      resizeFrame();
    }

    function resizeFrame() {
      if (Streamlit) {
        Streamlit.setFrameHeight(document.body.scrollHeight);
      }
    }

    function sendValue(value) {
      if (Streamlit) {
        Streamlit.setComponentValue(value);
      }
    }

    async function startCamera() {
      if (streamStarted) {
        return;
      }

      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          const message = "Camera API is not available in this browser.";
          setStatus(message, "error");
          sendValue({ error: message });
          return;
        }

        const stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });

        video.srcObject = stream;
        streamStarted = true;

        setStatus(
          "Webcam active. Capturing frame every " + captureIntervalSeconds + " seconds.",
          "ok"
        );

        video.onloadedmetadata = function () {
          resizeFrame();
          captureFrame();
        };

        if (captureTimer) {
          clearInterval(captureTimer);
        }

        captureTimer = setInterval(function () {
          captureFrame();
        }, captureIntervalSeconds * 1000);

      } catch (error) {
        let message = "Unable to access webcam: " + error.message;

        if (
          window.location.protocol !== "https:" &&
          window.location.hostname !== "localhost" &&
          window.location.hostname !== "127.0.0.1"
        ) {
          message += " Camera access requires HTTPS or localhost.";
        }

        setStatus(message, "error");
        sendValue({ error: message });
      }
    }

    function captureFrame() {
      try {
        if (!video.videoWidth || !video.videoHeight) {
          return;
        }

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        const context = canvas.getContext("2d");
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = canvas.toDataURL("image/jpeg", 0.75);

        sendValue({
          image: imageData,
          timestamp: Date.now()
        });

        setStatus(
          "Last frame captured at " + new Date().toLocaleTimeString(),
          "ok"
        );

      } catch (error) {
        const message = "Frame capture failed: " + error.message;
        setStatus(message, "error");
        sendValue({ error: message });
      }
    }

    function onRender(event) {
      const args = event.detail.args || {};

      captureIntervalSeconds = Number(args.capture_interval_seconds || 30);

      if (captureIntervalSeconds < 1) {
        captureIntervalSeconds = 30;
      }

      startCamera();
      resizeFrame();
    }

    Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
    Streamlit.setComponentReady();
    resizeFrame();
  </script>
</body>
</html>
