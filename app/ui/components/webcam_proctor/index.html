<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Webcam Proctor</title>

  <style>
    body {
      margin: 0;
      padding: 10px;
      font-family: Arial, sans-serif;
      background: transparent;
      box-sizing: border-box;
    }

    .container {
      border: 1px solid #dddddd;
      border-radius: 10px;
      padding: 12px;
      background: #ffffff;
      box-sizing: border-box;
    }

    video {
      width: 100%;
      max-width: 520px;
      border-radius: 8px;
      background: #000000;
      display: block;
    }

    canvas {
      display: none;
    }

    .status {
      margin-top: 8px;
      font-size: 14px;
      line-height: 1.4;
      color: #444444;
    }

    .ok {
      color: #0a7a0a;
      font-weight: bold;
    }

    .error {
      color: #b00020;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="status" class="status">Initializing webcam...</div>
  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const statusEl = document.getElementById("status");

    let captureIntervalSeconds = 30;
    let captureTimer = null;
    let streamStarted = false;

    function sendMessage(type, data) {
      const message = Object.assign(
        {
          isStreamlitMessage: true,
          type: type
        },
        data || {}
      );

      window.parent.postMessage(message, "*");
    }

    function setComponentReady() {
      sendMessage("streamlit:componentReady", {
        apiVersion: 1
      });
    }

    function setFrameHeight() {
      sendMessage("streamlit:setFrameHeight", {
        height: document.body.scrollHeight
      });
    }

    function setComponentValue(value) {
      sendMessage("streamlit:setComponentValue", {
        value: value,
        dataType: "json"
      });
    }

    function setStatus(message, cssClass) {
      statusEl.className = "status " + (cssClass || "");
      statusEl.innerText = message;
      setFrameHeight();
    }

    async function startCamera() {
      if (streamStarted) {
        restartCaptureTimer();
        return;
      }

      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          const message = "Camera API is not available in this browser.";
          setStatus(message, "error");
          setComponentValue(null);
          return;
        }

        const stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });

        video.srcObject = stream;
        streamStarted = true;

        setStatus(
          "Webcam active. Capturing frame every " + captureIntervalSeconds + " seconds.",
          "ok"
        );

        video.onloadedmetadata = function () {
          setFrameHeight();
          captureFrame();
        };

        restartCaptureTimer();

      } catch (error) {
        let message = "Unable to access webcam: " + error.message;

        if (
          window.location.protocol !== "https:" &&
          window.location.hostname !== "localhost" &&
          window.location.hostname !== "127.0.0.1"
        ) {
          message += " Camera access requires HTTPS or localhost.";
        }

        setStatus(message, "error");
        setComponentValue(null);
      }
    }

    function restartCaptureTimer() {
      if (captureTimer) {
        clearInterval(captureTimer);
      }

      captureTimer = setInterval(function () {
        captureFrame();
      }, captureIntervalSeconds * 1000);
    }

    function captureFrame() {
      try {
        if (!video.videoWidth || !video.videoHeight) {
          return;
        }

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        const context = canvas.getContext("2d");
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = canvas.toDataURL("image/jpeg", 0.75);

        setComponentValue(imageData);

        setStatus(
          "Last frame captured at " + new Date().toLocaleTimeString(),
          "ok"
        );

      } catch (error) {
        setStatus("Frame capture failed: " + error.message, "error");
        setComponentValue(null);
      }
    }

    function onRender(event) {
      if (!event.data || event.data.type !== "streamlit:render") {
        return;
      }

      const args = event.data.args || {};
      const interval = Number(args.capture_interval_seconds || 30);

      captureIntervalSeconds = interval > 0 ? interval : 30;

      startCamera();
      setFrameHeight();
    }

    window.addEventListener("message", onRender);

    setComponentReady();
    setFrameHeight();
  </script>
</body>
</html>
